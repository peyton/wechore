  <text x="706" y="410" fill="#121814" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700">Take out trash</text>
  <text x="706" y="440" fill="#5e6a62" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Peyton · In progress</text>
  <rect x="686" y="498" width="216" height="78" rx="12" fill="#07c160" />
