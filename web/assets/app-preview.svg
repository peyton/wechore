  <rect x="686" y="260" width="216" height="94" rx="12" fill="#fff" stroke="#d8eadc" />
  <text x="706" y="298" fill="#121814" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="700">Unload dishwasher</text>
