<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>WeChore app preview</title>
  <desc>A green chat-forward chore app preview with assignments, reminders, and suggestion chips.</desc>
  <rect width="1200" height="900" fill="#eef8f1" />
  <rect x="642" y="90" width="312" height="670" rx="48" fill="#111814" />
  <rect x="662" y="120" width="272" height="610" rx="34" fill="#f8fff9" />
