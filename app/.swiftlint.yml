disabled_rules:
  - trailing_comma
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - multiple_closures_with_trailing_closure

line_length:
  warning: 140
  error: 180

identifier_name:
  min_length:
    warning: 2

excluded:
  - WeChore.xcworkspace
  - Tuist/Dependencies
  - build
