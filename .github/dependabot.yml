version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
      timezone: "America/Los_Angeles"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "github-actions"
