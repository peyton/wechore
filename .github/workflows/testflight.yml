---
name: TestFlight

on:
  push:
    branches: [master]
    paths:
      - "app/**"
      - "scripts/app_store_connect/**"
      - "scripts/cloudkit/**"
      - "scripts/tooling/**"
      - "justfile"
      - "mise.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/testflight.yml"
      - "web/.well-known/apple-app-site-association"
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  upload:
    name: Upload To TestFlight
    runs-on: macos-latest
    environment: testflight
    timeout-minutes: 90
    env:
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
      TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
      WECHORE_CLOUD_KIT_ENVIRONMENT: Production
      WECHORE_DISABLE_SWIFT_COMPILE_CACHE: "1"
      WECHORE_FLAVOR: prod
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: "26.3.0"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Set build metadata
        run: mise exec -- uv run python -m scripts.tooling.resolve_versions --format github-env >> "$GITHUB_ENV"
      - name: Check TestFlight credentials
        id: testflight-credentials
        run: |
          missing=()
          for name in \
            TEAM_ID \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_P8_BASE64
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '::notice::Skipping TestFlight upload because required testflight environment values are missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
          fi
      - name: Validate release metadata
        if: steps.testflight-credentials.outputs.available == 'true'
        run: mise exec -- just appstore-preflight
      - name: Verify App Store Connect app
        if: steps.testflight-credentials.outputs.available == 'true'
        run: mise exec -- just appstore-check
      - name: Archive and upload
        if: steps.testflight-credentials.outputs.available == 'true'
        run: mise exec -- just testflight-upload
