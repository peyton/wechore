---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Run lint shard
        run: mise exec -- just ci-lint

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Run Python shard
        run: mise exec -- just ci-python

  test-ios:
    name: iOS Tests
    runs-on: macos-latest
    needs: lint
    env:
      WECHORE_FLAVOR: prod
      WECHORE_DISABLE_SWIFT_COMPILE_CACHE: "1"
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Run unit tests
        run: mise exec -- just test-unit
      - name: Run integration tests
        run: mise exec -- just test-integration
      - name: Run iPhone UI tests
        run: mise exec -- just test-ui
      - name: Run iPad UI tests
        run: mise exec -- just test-ui-ipad

  build:
    name: Build iOS
    runs-on: macos-latest
    needs: lint
    env:
      WECHORE_FLAVOR: prod
      WECHORE_DISABLE_SWIFT_COMPILE_CACHE: "1"
    steps:
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1
        with:
          xcode-version: latest
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Set CI build metadata
        shell: bash
        run: mise exec -- uv run python -m scripts.tooling.resolve_versions --format github-env >> "$GITHUB_ENV"
      - name: Run iOS build shard
        run: mise exec -- just ci-build
