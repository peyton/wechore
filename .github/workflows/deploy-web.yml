---
name: Deploy Web

on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "scripts/cloudflare/**"
      - "scripts/web/**"
      - "justfile"
      - "mise.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    branches: [master]
    paths:
      - "web/**"
      - "scripts/cloudflare/**"
      - "scripts/web/**"
      - "justfile"
      - "mise.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  production:
    name: Deploy Production Web
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: web-production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Check Cloudflare credentials
        id: cloudflare-credentials
        shell: bash
        run: |
          missing=()
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '::notice::Skipping production Cloudflare deploy because required web-production environment values are missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
          fi
      - name: Validate production web site
        if: steps.cloudflare-credentials.outputs.available != 'true'
        run: mise exec -- just web-build
      - name: Deploy production Pages site
        if: steps.cloudflare-credentials.outputs.available == 'true'
        run: mise exec -- just cloudflare-deploy BRANCH=master

  preview:
    name: Deploy Preview Web
    if: >-
      ${{
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    environment: web-preview
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          cache: true
      - name: Check Cloudflare credentials
        id: cloudflare-credentials
        shell: bash
        run: |
          missing=()
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            printf '::notice::Skipping preview Cloudflare deploy because required web-preview environment values are missing: %s\n' "$(IFS=', '; echo "${missing[*]}")"
          fi
      - name: Validate preview web site
        if: steps.cloudflare-credentials.outputs.available != 'true'
        run: mise exec -- just web-build
      - name: Deploy preview Pages site
        if: steps.cloudflare-credentials.outputs.available == 'true'
        run: mise exec -- just cloudflare-deploy BRANCH=pr-${{ github.event.number }}
